<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bilik Bazası</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header id="header">
  <button id="burger-btn" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
  </button>
  <div class="logo"><i class="ti ti-bolt"></i> Bilik Bazası</div>
  <div id="header-actions">
    <button class="hdr-btn" id="search-toggle-btn" onclick="toggleMobileSearch()" title="Axtar">
      <i class="ti ti-search"></i>
    </button>
    <button class="hdr-btn" onclick="openEditor(null)" title="Yeni qeyd">
      <i class="ti ti-plus"></i>
    </button>
    <button class="hdr-btn" onclick="openObsidianView()" title="Xəritə">
      <i class="ti ti-topology-star"></i>
    </button>
  </div>
</header>

<!-- MOBILE SEARCH BAR (hidden by default) -->
<div id="mobile-search-bar">
  <div id="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Axtar..." oninput="handleSearch(this.value)" autocomplete="off">
    <button id="search-close-btn" onclick="toggleMobileSearch()"><i class="ti ti-x"></i></button>
    <div id="search-results"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Kateqoriyalar</span>
    <button id="add-cat-btn" onclick="openAddCatModal()" title="Kateqoriya əlavə et">
      <i class="ti ti-plus"></i>
    </button>
  </div>
  <div id="cat-list"></div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="content-area">

    <!-- WELCOME -->
    <div id="welcome">
      <div class="welcome-icon"><i class="ti ti-bolt"></i></div>
      <div class="welcome-title">Bilik Bazana Xoş Gəldin</div>
      <div class="welcome-sub">Sol menyudan kateqoriya seç və ya yeni qeyd əlavə et.</div>
      <div class="welcome-stats">
        <div class="stat-box">
          <div class="stat-num" id="stat-notes">0</div>
          <div class="stat-label">Qeyd</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-cats">0</div>
          <div class="stat-label">Kateqoriya</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-files">0</div>
          <div class="stat-label">Fayl</div>
        </div>
      </div>
      <button class="btn btn-primary welcome-new-btn" onclick="openEditor(null)" style="margin-top:20px">
        <i class="ti ti-plus"></i> Yeni Qeyd
      </button>
    </div>

    <!-- CATEGORY VIEW -->
    <div id="cat-view">
      <div class="cat-view-header">
        <div>
          <div class="cat-view-title" id="cv-title"></div>
          <div style="font-size:12px;color:#888;margin-top:3px" id="cv-subtitle"></div>
        </div>
        <button class="btn btn-primary" onclick="openEditor(null)">
          <i class="ti ti-plus"></i> Yeni
        </button>
      </div>
      <div class="note-cards" id="note-cards"></div>
    </div>

    <!-- NOTE VIEW -->
    <div id="note-view">
      <div class="note-view-header">
        <div class="note-view-top-bar">
          <button class="btn btn-ghost btn-back" onclick="goBack()">
            <i class="ti ti-arrow-left"></i>
          </button>
          <div class="note-view-title" id="nv-title"></div>
          <div class="note-view-actions">
            <button class="btn btn-ghost btn-icon-only" onclick="openEditor(currentNoteId)" title="Redaktə">
              <i class="ti ti-edit"></i>
            </button>
            <button class="btn btn-ghost btn-icon-only" onclick="openLinkModal(currentNoteId)" title="Əlaqə">
              <i class="ti ti-link"></i>
            </button>
            <button class="btn btn-danger btn-icon-only" onclick="deleteNote(currentNoteId)" title="Sil">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>
        <div class="note-view-meta" id="nv-meta"></div>
      </div>
      <div class="note-body ql-editor" id="nv-body"></div>
      <div class="note-files" id="nv-files" style="display:none">
        <div class="note-files-title">Əlavə Fayllar</div>
        <div class="file-grid" id="nv-file-grid"></div>
      </div>
    </div>

    <!-- EDITOR -->
    <div id="editor-view">
      <div class="editor-header">
        <button class="btn btn-ghost btn-icon-only" onclick="cancelEditor()">
          <i class="ti ti-arrow-left"></i>
        </button>
        <input type="text" id="editor-title-input" placeholder="Başlıq...">
      </div>
      <div class="editor-selects">
        <select id="editor-cat-select" class="editor-cat-select"></select>
        <select id="editor-subcat-select" class="editor-cat-select"></select>
      </div>

      <!-- QUILL EDITOR -->
      <div id="editor-container">
        <div id="quill-toolbar">
          <span class="ql-formats">
            <select class="ql-header">
              <option value="1">H1</option>
              <option value="2">H2</option>
              <option value="3">H3</option>
              <option selected></option>
            </select>
          </span>
          <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-blockquote"></button>
            <button class="ql-code-block"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-link"></button>
            <button class="ql-image"></button>
          </span>
          <span class="ql-formats">
            <select class="ql-color"></select>
            <select class="ql-align"></select>
            <button class="ql-clean"></button>
          </span>
        </div>
        <div id="quill-editor"></div>
      </div>

      <!-- FILE UPLOAD AREA -->
      <div id="file-upload-area">
        <input type="file" id="file-input" multiple accept="*/*" onchange="handleFileSelect(this.files)">
        <i class="ti ti-cloud-upload"></i>
        <p>Fayl seç və ya sürükle</p>
        <span>📄 PDF · 🖼️ Şəkil · 🎬 Video · 🎵 Audio · 📝 Word · 📊 Excel</span>
      </div>
      <div id="staged-files"></div>

      <div class="editor-footer">
        <button class="btn btn-ghost" onclick="cancelEditor()">Ləğv et</button>
        <button class="btn btn-primary" onclick="saveNote()">
          <i class="ti ti-device-floppy"></i> Saxla
        </button>
      </div>
    </div>

    <!-- OBSIDIAN GRAPH VIEW (inline iframe) -->
    <div id="obsidian-view" style="display:none">
      <div class="obsidian-header">
        <button class="btn btn-ghost btn-icon-only" onclick="closeObsidianView()">
          <i class="ti ti-arrow-left"></i>
        </button>
        <span class="obsidian-header-title"><i class="ti ti-topology-star"></i> Əlaqə Xəritəsi</span>
      </div>
      <iframe id="obsidian-iframe" src="obsidian.html" frameborder="0"></iframe>
    </div>

  </div>
</div>

<!-- MOBILE FAB (floating action button) -->
<button id="fab-btn" onclick="openEditor(null)" title="Yeni qeyd">
  <i class="ti ti-plus"></i>
</button>

<!-- FILE MODAL -->
<div id="file-modal">
  <div id="file-modal-inner">
    <div id="file-modal-header">
      <span id="file-modal-title"></span>
      <button id="file-modal-close" onclick="closeFileModal()"><i class="ti ti-x"></i></button>
    </div>
    <div id="file-modal-body"></div>
  </div>
</div>

<!-- LINK MODAL -->
<div id="link-modal">
  <div id="link-modal-inner">
    <div class="modal-title"><i class="ti ti-link" style="color:#111;margin-right:8px"></i>Əlaqə Qur</div>
    <div class="modal-label">Bu qeydi aşağıdakı ilə əlaqələndir:</div>
    <select class="modal-select" id="link-target-select"></select>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLinkModal()">Ləğv et</button>
      <button class="btn btn-primary" onclick="confirmLink()"><i class="ti ti-check"></i> Əlavə et</button>
    </div>
  </div>
</div>

<!-- GENERIC MODAL -->
<div id="generic-modal">
  <div id="generic-modal-inner">
    <div class="modal-title" id="gm-title"></div>
    <div class="modal-label" id="gm-label" style="margin-bottom:8px"></div>
    <input type="text" class="modal-input" id="gm-input" placeholder="">
    <div id="gm-extra" style="margin-bottom:14px;display:none">
      <div class="modal-label" id="gm-extra-label"></div>
      <input type="text" class="modal-input" id="gm-extra-input" placeholder="Emoji (ixtiyari)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGenericModal()">Ləğv et</button>
      <button class="btn btn-primary" id="gm-confirm-btn">Təsdiqlə</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><i class="ti ti-check" id="toast-icon"></i><span id="toast-msg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script src="app.js"></script>
<script type="module" src="firebase-config.js"></script>
</body>
</html>
